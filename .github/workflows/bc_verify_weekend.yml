name: BC Verify Weekend

# 週末 V3 數據完整性核查（取代 DC 平日多輪 verify）
# 判準退一天 + verdict 持久化 + 金絲雀假日防禦；可選 workflow 接力
# v1.1（2026-07-09）：自己的 schedule cron（含週六本跑+週日兜底）拿掉，
# 改由 bc_refresh_models.yml（BC排程鏈唯一自動觸發入口）在偵測到當天是
# 週六/週日時 dispatch 這裡，沿用同一套「本跑+兜底」邏輯，verdict冪等
# 不受影響；workflow_dispatch 保留，仍可單獨手動觸發測試。

on:
  workflow_dispatch:
    inputs:
      chain_next:
        description: "完成後接力的 workflow 檔名（留空不接力）"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

concurrency:
  group: bc-verify
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install pymongo requests pytz

      - name: Run weekend verify
        env:
          MONGO_URI:        ${{ secrets.MONGO_URI }}
          POLYGON_KEY:      ${{ secrets.POLYGON_KEY }}
          WEBHOOK_SECRET:   ${{ secrets.WEBHOOK_SECRET }}
          COMM_HUB_URL:     ${{ secrets.COMM_HUB_URL }}
          ANALYSIS_HUB_URL: ${{ secrets.ANALYSIS_HUB_URL }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          NEXT_WORKFLOW:    ${{ inputs.chain_next || '' }}
          PYTHONUNBUFFERED: "1"
        run: python run_verify_weekend.py
