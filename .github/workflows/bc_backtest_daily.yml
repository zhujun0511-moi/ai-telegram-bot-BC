name: BC Backtest Daily

# 每日回測（取代 LC /webhook/daily）——主觸發改為事件驅動：
# DC after_hours ALL_DONE 後即時 dispatch 這個 workflow（見 DC
# tasks/v3_processor.py._dispatch_bc_backtest），不再依賴多班崗輪詢。
# v1.2（2026-07-07）：4班崗輪詢降級為 1 班安全網——事件驅動觸發若因
# GH_TOKEN失效/DC鎖死等意外沒發出，末班 cron 仍會補跑+發截止告警。
# v1.1：單次 run 循環吃光全部欠課；可選 workflow 接力（chain_next）
# v1.3（2026-07-09）：自己的 schedule cron 拿掉，改由 bc_refresh_models.yml
# （BC排程鏈唯一自動觸發入口，先刷新免費模型再dispatch這裡）統一驅動；
# workflow_dispatch 保留，DC事件驅動觸發、手動測試都不受影響。

on:
  workflow_dispatch:
    inputs:
      chain_next:
        description: "完成後接力的 workflow 檔名（如 bc_verify_weekend.yml，留空不接力）"
        required: false
        default: ""

permissions:
  contents: read
  actions: write    # workflow 接力所需（GITHUB_TOKEN dispatch）

concurrency:
  group: bc-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install pymongo requests pytz

      - name: Run daily backtest
        env:
          MONGO_URI:      ${{ secrets.MONGO_URI }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          COMM_HUB_URL:   ${{ secrets.COMM_HUB_URL }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          NEXT_WORKFLOW:  ${{ inputs.chain_next || '' }}
          PYTHONUNBUFFERED: "1"
        run: python run_backtest_daily.py
